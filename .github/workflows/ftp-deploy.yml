name: Deploy to All-Inkl FTP

on:
  push:
    branches:
      - main # Der Workflow startet, wenn du auf 'main' pushst

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build Angular App
      run: npm run build -- --configuration production

    - name: Upload to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/dyad-angular-template/
        # Falls die Dateien in einen bestimmten Unterordner auf All-Inkl sollen, 
        # kannst du das hier einkommentieren und anpassen:
        # server-dir: /dein-unterordner/